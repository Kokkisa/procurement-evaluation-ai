services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: proceval
      POSTGRES_PASSWORD: proceval
      POSTGRES_DB: proceval
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  app:
    build: { context: .., dockerfile: deploy/Dockerfile }
    env_file: ../.env
    depends_on: [postgres]
    ports: ["8000:8000", "8501:8501"]
    volumes: ["../data:/app/data"]
volumes:
  pgdata:
